<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CORTEX</h1>
            <div class="analog-clock">
                <div class="hand hour-hand" id="hr-hand"></div>
                <div class="hand minute-hand" id="min-hand"></div>
                <div class="hand second-hand" id="sec-hand"></div>
                <div class="clock-center"></div>
            </div>
        </header>
        
        <main class="grid">
            <section class="module">
                <h2>Habits</h2>
                <div id="habits-container" class="list">Loading...</div>
            </section>
            
            <section class="module">
                <h2>Pending Tasks</h2>
                <div id="tasks-container" class="list">Loading...</div>
            </section>
            
            <section class="module">
                <h2>Active Projects</h2>
                <div id="projects-container" class="list">Loading...</div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
